name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Build PCM archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash PCM/create_pcm_archive.sh "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
          generate_release_notes: true
          body: |
            ## Installation via KiCad Plugin Manager

            Open KiCad → **Plugin and Content Manager** → **Install from File**,
            then select the ZIP below.

            Or extract manually into your KiCad scripting plugins directory
            (no separate `pip install` needed — dependencies are bundled).

            **SHA256:** `${{ env.DOWNLOAD_SHA256 }}`

            ## PCM Repository Submission

            The `metadata.json` inside the ZIP contains all fields needed for a
            [kicad-addons](https://gitlab.com/kicad/addons/repository) PR.
